<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Aluno</title>
	</head>
<body>
	<h3><label th:text="${novo} ?'Novo ' : 'Editar '"></label>Aluno</h3>
		<form th:action="@{/alunos/save}" th:object="${aluno}" method="post">
			<table border="1">
				<tr>
					<th>ID</th><td><input type="text" th:field="*{ra}" size="40" readonly /></td>
				</tr>	
				<tr>
					<th>Nome</th><td><input type="text" th:field="*{nome}" size="40" /></td>
				</tr>	
				<tr>
					<th>Email</th><td><input type="text" th:field="*{email}" size="40" /></td>
				</tr>	
				<tr>
					<th>Data de Nascimento</th><td><input type="text" th:field="*{dataNascimento}" size="40" /></td>
				</tr>	
				<tr>
					<th>Endereço</th><td><input type="text" th:field="*{endereco}" size="40" /></td>
				</tr>	
				<tr>
					<th>Período</th>
					<td><select th:field="*{periodo}" size="1">
							<option th:value="*{periodo}" th:text="*{periodo}"></option>
							<option th:value="Manha" th:text="Manhã"></option>
							<option th:value="Tarde" th:text="Tarde"></option>
							<option th:value="Noite" th:text="Noite"></option>
						</select>
				</tr>	
				<tr>
					<td colspan="2">
						<input type="submit" value="Enviar" />
						<a th:href="@{/alunos/list}">Sair</a>
					</td>	
				</tr>
			</table>
		</form>
</body>
</html>
